services:
  auth-mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: authdb
      MYSQL_USER: fintech
      MYSQL_PASSWORD: fintech
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - auth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ufintech", "-pfintech"]
      interval: 10s
      timeout: 5s
      retries: 10

  transaction-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
    ports:
      - "5432:5432"
    volumes:
      - transaction_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d ledgerdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      auth-mysql:
        condition: service_healthy
    volumes:
      - ./migrations/mysql:/migrations:ro
    command: ["-path", "/migrations", "-database", "mysql://fintech:fintech@tcp(auth-mysql:3306)/authdb", "up"]
    restart: on-failure

  transaction-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      transaction-postgres:
        condition: service_healthy
    volumes:
      - ./migrations/postgres:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://fintech:fintech@transaction-postgres:5432/ledgerdb?sslmode=disable", "up"]
    restart: on-failure

  auth:
    build:
      context: ./services/auth
    environment:
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
      MYSQL_DSN: fintech:fintech@tcp(auth-mysql:3306)/authdb?parseTime=true&multiStatements=false
      JWT_SECRET: ${JWT_SECRET:-change-me-with-a-strong-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      auth-mysql:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully

  transaction:
    build:
      context: ./services/transaction
    environment:
      HTTP_ADDR: :8081
      GRPC_ADDR: :9091
      POSTGRES_DSN: postgres://fintech:fintech@transaction-postgres:5432/ledgerdb?sslmode=disable
      AUTH_GRPC_ADDR: auth:9090
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      transaction-postgres:
        condition: service_healthy
      transaction-migrate:
        condition: service_completed_successfully
      auth:
        condition: service_started

  dashboard:
    build:
      context: ./frontend/dashboard
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8080
      NEXT_PUBLIC_TRANSACTION_API_URL: http://localhost:8081
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - transaction

volumes:
  auth_mysql_data:
  transaction_postgres_data:

